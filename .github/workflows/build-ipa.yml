name: Build Unsigned IPA - Mismari+

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies (with hoist)
        run: pnpm install --shamefully-hoist

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Expo Prebuild
        working-directory: artifacts/plus-app
        run: npx expo prebuild --platform ios --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Pod Install
        working-directory: artifacts/plus-app/ios
        run: pod install

      - name: Find workspace and scheme
        id: ws
        working-directory: artifacts/plus-app/ios
        run: |
          WS=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(basename "$WS" .xcworkspace)
          echo "workspace=$WS" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Found workspace: $WS | Scheme: $SCHEME"

      - name: Build (Unsigned)
        working-directory: artifacts/plus-app/ios
        run: |
          xcodebuild build \
            -workspace "${{ steps.ws.outputs.workspace }}" \
            -scheme "${{ steps.ws.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== BUILD ERRORS ==="
            grep -E "error:|fatal error:" build_output.txt | tail -30
            exit $EXIT_CODE
          fi

      - name: Create IPA
        working-directory: artifacts/plus-app/ios
        run: |
          APP=$(find build -name "*.app" -path "*/Release-iphoneos/*" | head -1)
          echo "Found app: $APP"
          if [ -z "$APP" ]; then
            echo "ERROR: .app file not found!"
            find build -name "*.app" || true
            exit 1
          fi
          mkdir -p IPA_Build/Payload
          cp -r "$APP" IPA_Build/Payload/
          cd IPA_Build && zip -r ../Mismari-Plus-Unsigned.ipa Payload
          mv Mismari-Plus-Unsigned.ipa ../../..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Mismari-Plus-Unsigned-IPA
          path: Mismari-Plus-Unsigned.ipa
          retention-days: 30
